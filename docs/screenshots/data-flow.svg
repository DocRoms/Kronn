<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480"
     role="img" aria-labelledby="dataflow-title dataflow-desc"
     font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- Data-flow / trust-boundary diagram — dark-only palette to match the
       always-dark Kronn_Hero banner. Yellow accent (#fbbf24) for the CLI
       process zone reprends the lightning bolt from the logo. -->
  <title id="dataflow-title">Where your data goes — three trust zones around Kronn</title>
  <desc id="dataflow-desc">
    Trust-boundary diagram with three zones from left to right. Zone one, your machine in green: Kronn backend running on Rust with axum and SQLite, an encrypted vault at rest using AES-256-GCM, your discussions and projects and MCP configs in SQLite, and optionally Ollama as a local LLM. Zone two, agent CLI process in yellow dashed: a subprocess you control, where Kronn spawns binaries like claude, codex, gemini with the prompt and MCP context, with stdout streamed back and persisted locally. Zone three, vendor LLM in red dashed: only if you chose a cloud agent — Anthropic, OpenAI, Google, Mistral or GitHub receive your prompts plus code excerpts. If you pick Ollama as your default agent, the flow ends inside the green zone and the yellow and red zones disappear entirely.
  </desc>

  <rect x="0" y="0" width="1000" height="480" fill="#0d1117"/>

  <style>
    .title    { font-size: 22px; font-weight: 700; fill: #f9fafb; }
    .zone-h   { font-size: 14px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
    .label    { font-size: 14px; font-weight: 600; fill: #f9fafb; }
    .small    { font-size: 12px; fill: #d1d5db; }
    .tiny     { font-size: 11px; fill: #9ca3af; font-style: italic; }
    .zone-local-h   { fill: #34d399; }
    .zone-cli-h     { fill: #fbbf24; }
    .zone-vendor-h  { fill: #f87171; }
  </style>

  <text x="500" y="34" text-anchor="middle" class="title">Where your data goes</text>

  <g role="group" aria-label="Zone 1: your machine — Kronn backend, vault, local discussions, optional Ollama">
    <rect x="30" y="60" width="380" height="380" rx="14"
          fill="#34d399" fill-opacity="0.08" stroke="#34d399" stroke-width="2"/>
    <text x="220" y="92" text-anchor="middle" class="zone-h zone-local-h">Your machine</text>
    <text x="220" y="112" text-anchor="middle" class="tiny">trust boundary you own</text>

    <rect x="60" y="138" width="320" height="56" rx="8"
          fill="#0d1117" stroke="#34d399" stroke-width="1.2" stroke-opacity="0.6"/>
    <text x="80" y="165" class="label">Kronn backend</text>
    <text x="80" y="184" class="small">Rust + axum + SQLite · all state local</text>

    <rect x="60" y="208" width="320" height="56" rx="8"
          fill="#0d1117" stroke="#34d399" stroke-width="1.2" stroke-opacity="0.6"/>
    <text x="80" y="235" class="label">Encrypted vault</text>
    <text x="80" y="254" class="small">AES-256-GCM · ~/.config/kronn/config.toml · 0600</text>

    <rect x="60" y="278" width="320" height="56" rx="8"
          fill="#0d1117" stroke="#34d399" stroke-width="1.2" stroke-opacity="0.6"/>
    <text x="80" y="305" class="label">Discussions, projects, MCP configs</text>
    <text x="80" y="324" class="small">SQLite · WAL mode · never leaves disk</text>

    <rect x="60" y="348" width="320" height="64" rx="8"
          fill="#34d399" fill-opacity="0.18" stroke="#34d399" stroke-width="1.5"/>
    <text x="80" y="375" class="label">🦙 Ollama (optional)</text>
    <text x="80" y="394" class="small">Local LLM via localhost:11434</text>
    <text x="80" y="408" class="tiny">If you pick this agent → flow ends inside this zone.</text>
  </g>

  <g role="group" aria-label="Zone 2: agent CLI process — a subprocess Kronn spawns, optional">
    <rect x="440" y="60" width="240" height="260" rx="14"
          fill="#fbbf24" fill-opacity="0.08" stroke="#fbbf24" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="560" y="92" text-anchor="middle" class="zone-h zone-cli-h">Agent CLI process</text>
    <text x="560" y="112" text-anchor="middle" class="tiny">subprocess you control (optional)</text>

    <rect x="460" y="138" width="200" height="44" rx="6"
          fill="#0d1117" stroke="#fbbf24" stroke-width="1.2" stroke-opacity="0.6"/>
    <text x="560" y="165" text-anchor="middle" class="label">claude / codex / gemini …</text>

    <text x="560" y="206" text-anchor="middle" class="small">Kronn spawns this subprocess</text>
    <text x="560" y="224" text-anchor="middle" class="small">with the prompt + MCP context</text>
    <text x="560" y="248" text-anchor="middle" class="tiny">Logs + stdout streamed back</text>
    <text x="560" y="264" text-anchor="middle" class="tiny">→ persisted in your local SQLite</text>
    <text x="560" y="296" text-anchor="middle" class="tiny">Outbound: vendor API only (next zone)</text>
  </g>

  <g role="group" aria-label="Zone 3: vendor LLM — outside your control, only reached if you picked a cloud agent">
    <rect x="710" y="60" width="260" height="260" rx="14"
          fill="#f87171" fill-opacity="0.08" stroke="#f87171" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="840" y="92" text-anchor="middle" class="zone-h zone-vendor-h">Vendor LLM</text>
    <text x="840" y="112" text-anchor="middle" class="tiny">outside your control</text>

    <rect x="730" y="138" width="220" height="40" rx="6"
          fill="#0d1117" stroke="#f87171" stroke-width="1.2" stroke-opacity="0.6"/>
    <text x="840" y="163" text-anchor="middle" class="label">Anthropic</text>

    <rect x="730" y="184" width="220" height="40" rx="6"
          fill="#0d1117" stroke="#f87171" stroke-width="1.2" stroke-opacity="0.6"/>
    <text x="840" y="209" text-anchor="middle" class="label">OpenAI</text>

    <rect x="730" y="230" width="220" height="40" rx="6"
          fill="#0d1117" stroke="#f87171" stroke-width="1.2" stroke-opacity="0.6"/>
    <text x="840" y="255" text-anchor="middle" class="label">Google · Mistral · GitHub</text>

    <text x="840" y="296" text-anchor="middle" class="tiny">Your prompts + code excerpts go here</text>
    <text x="840" y="310" text-anchor="middle" class="tiny">(this is what Ollama lets you avoid)</text>
  </g>

  <path d="M 410 200 L 440 200" stroke="#fbbf24" stroke-width="2" fill="none" aria-hidden="true"/>
  <polygon points="440,200 432,196 432,204" fill="#fbbf24" aria-hidden="true"/>
  <text x="425" y="190" text-anchor="middle" class="tiny">spawn</text>

  <path d="M 680 200 L 710 200" stroke="#f87171" stroke-width="2" fill="none" stroke-dasharray="4 3" aria-hidden="true"/>
  <polygon points="710,200 702,196 702,204" fill="#f87171" aria-hidden="true"/>
  <text x="695" y="190" text-anchor="middle" class="tiny">HTTPS</text>

  <path d="M 710 230 L 680 230" stroke="#f87171" stroke-width="2" fill="none" stroke-dasharray="4 3" aria-hidden="true"/>
  <polygon points="680,230 688,226 688,234" fill="#f87171" aria-hidden="true"/>

  <path d="M 440 230 L 410 230" stroke="#fbbf24" stroke-width="2" fill="none" aria-hidden="true"/>
  <polygon points="410,230 418,226 418,234" fill="#fbbf24" aria-hidden="true"/>

  <text x="500" y="455" text-anchor="middle" class="small">
    Kronn itself never phones home. Telemetry, update checks, P2P contact sharing — all opt-in or absent.
  </text>
  <text x="500" y="473" text-anchor="middle" class="tiny">
    Stay 100% in the green zone? Set Ollama as your default agent. No yellow, no red.
  </text>
</svg>
