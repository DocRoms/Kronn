services:
  backend:
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        CARGO_PROFILE: ${CARGO_PROFILE:-fast}
        APP_UID: ${KRONN_HOST_UID:-1000}
        APP_GID: ${KRONN_HOST_GID:-1000}
    group_add:
      - "${KRONN_DOCKER_GID:-989}"  # Docker socket GID for docker compose access
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Linux: resolve host.docker.internal → host IP (macOS/Windows have this built-in)
    expose:
      - "3140"
    volumes:
      - kronn-data:/data
      - ${HOME}:/host-home:ro
      - ${KRONN_REPOS_DIR:-${HOME}/Repositories}:/host-home/${KRONN_REPOS_REL:-Repositories}:rw  # rw for agent writes
      - ${KRONN_GLOBAL_BIN:-/usr/local/bin}:/host-bin/global:ro
      - ${KRONN_GLOBAL_LIB:-/usr/local/lib}:/host-bin/lib:ro  # npm global node_modules (sibling of /host-bin/global so `../lib/node_modules/...` relative symlinks resolve — fixes Fastly CLI which ships as a JS wrapper when installed via `npm -g`)
      - ${HOME}/.local/bin:/host-bin/local:ro
      - ${KRONN_NPM_BIN:-/dev/null}:/host-bin/npm:ro  # npm global bin (macOS: ~/.npm/bin or /opt/homebrew/bin)
      - /usr/bin:/host-bin/sysbin:ro              # Host system binaries (make, php, etc.)
      - /usr/sbin:/host-bin/syssbin:ro            # Host system admin binaries
      - /usr/libexec/docker/cli-plugins:/usr/libexec/docker/cli-plugins:ro  # Docker compose plugin
      - /var/run/docker.sock:/var/run/docker.sock  # Docker socket for docker compose
      - ${HOME}/.local/share:/host-home/.local/share:ro  # Symlink targets (claude, vibe)
      - npm-cache:/home/kronn/.npm  # Persistent npm cache for npx agent execution
      - ${HOME}/.cache/uv:/home/kronn/.cache/uv:rw  # Share host uv cache for Python MCP servers
      - uv-tools:/home/kronn/.local/share/uv  # Persistent uv tool installs (CloudWatch, Atlassian MCP servers)
      # SSH auth for git push (forward host SSH keys)
      - ${HOME}/.ssh:/home/kronn/.ssh:ro                    # SSH keys + known_hosts
      - ${SSH_AUTH_SOCK:-/dev/null}:/run/host-ssh-agent.sock  # SSH agent socket (Linux)
      - ${KRONN_MACOS_SSH_SOCK:-/dev/null}:/run/host-services/ssh-auth.sock  # SSH agent socket (macOS Docker Desktop)
      # Agent auth directories (local subscriptions)
      - ${HOME}/.claude.json:/home/kronn/.claude.json:ro    # Claude Code main config
      - ${HOME}/.claude:/home/kronn/.claude:rw              # Claude Code auth/config + session state (needs write)
      - claude-projects:/home/kronn/.claude/projects         # Isolate Docker sessions from host (avoids ghost /host-home project dirs)
      - ${HOME}/.codex:/home/kronn/.codex:rw                # Codex auth + state (needs write)
      - ${HOME}/.config/codex:/home/kronn/.config/codex:ro  # Codex config (legacy path)
      - ${HOME}/.vibe:/home/kronn/.vibe:rw                  # Vibe auth + state (needs write)
      - ${HOME}/.kiro:/home/kronn/.kiro:rw                  # Kiro auth + state (AWS Builder ID)
      - ${HOME}/.copilot:/home/kronn/.copilot:rw              # GitHub Copilot auth + config
      - ${HOME}/.gemini:/home/kronn/.gemini:rw                # Gemini CLI auth + project registry + settings
      - ${HOME}/.local/share/kiro-cli:/home/kronn/.local/share/kiro-cli:rw  # Kiro SQLite data
      - ./templates:/app/templates:ro                   # AI context templates for project init
    environment:
      - KRONN_TEMPLATES_DIR=/app/templates
      - KRONN_DATA_DIR=/data
      - KRONN_HOST_HOME=${HOME}
      - KRONN_HOST_BIN=/host-bin/local:/host-bin/global:/host-bin/npm
      - PATH=/home/kronn/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/host-bin/local:/host-bin/global:/host-bin/npm:/host-bin/sysbin:/host-bin/syssbin
      - KRONN_HOST_OS=${KRONN_HOST_OS:-Linux}
      - KRONN_HOST_UID=${KRONN_HOST_UID:-1000}
      - KRONN_HOST_GID=${KRONN_HOST_GID:-1000}
      - KRONN_HOST_IPS=${KRONN_HOST_IPS:-}
      - SSH_AUTH_SOCK=/run/host-ssh-agent.sock
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GH_TOKEN=${GH_TOKEN:-${GITHUB_TOKEN:-}}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      # RUST_LOG: if unset, the backend reads `config.server.debug_mode` to
      # pick a sensible default (info vs debug). Set `KRONN_RUST_LOG` in the
      # env (or via `./kronn start --debug` / `make start DEBUG=1`) to
      # override for one run without touching the persisted config.
      - RUST_LOG=${KRONN_RUST_LOG:-}
    # Resource limits — prevents runaway agents from consuming all host resources
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3140/api/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  frontend:
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3141:80"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    depends_on:
      backend:
        condition: service_healthy

  # Single entry point: nginx reverse proxy
  gateway:
    restart: unless-stopped
    image: nginx:alpine
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    ports:
      - "3140:80"
    volumes:
      - ./.docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

volumes:
  kronn-data:
  npm-cache:
  uv-tools:
  claude-projects:  # Isolates Docker Claude Code sessions from host ~/.claude/projects
