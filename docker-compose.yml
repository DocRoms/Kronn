services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "3140"
    volumes:
      - kronn-data:/data
      - ${HOME}:/host-home:ro
      - ${KRONN_REPOS_DIR:-${HOME}/Repositories}:/host-home/Repositories:rw  # rw for .mcp.json writes
      - /usr/local/bin:/host-bin/global:ro
      - ${HOME}/.local/bin:/host-bin/local:ro
      - ${HOME}/.local/share:/host-home/.local/share:ro  # Symlink targets (claude, vibe)
      - npm-cache:/root/.npm  # Persistent npm cache for npx agent execution
      - ${HOME}/.cache/uv:/root/.cache/uv:rw  # Share host uv cache for Python MCP servers
      - uv-tools:/root/.local/share/uv  # Persistent uv tool installs (CloudWatch, Atlassian MCP servers)
      # Agent auth directories (local subscriptions)
      - ${HOME}/.claude.json:/root/.claude.json:ro    # Claude Code main config
      - ${HOME}/.claude:/root/.claude:ro              # Claude Code auth/config
      - ${HOME}/.codex:/root/.codex:rw                # Codex auth + state (needs write)
      - ${HOME}/.config/codex:/root/.config/codex:ro  # Codex config (legacy path)
      - ${HOME}/.vibe:/root/.vibe:rw                  # Vibe auth + state (needs write)
      - ./templates:/app/templates:ro                   # AI context templates for project init
    environment:
      - KRONN_TEMPLATES_DIR=/app/templates
      - KRONN_DATA_DIR=/data
      - KRONN_HOST_HOME=${HOME}
      - KRONN_HOST_BIN=/host-bin/local:/host-bin/global
      - RUST_LOG=kronn=debug,tower_http=debug

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3141:80"
    depends_on:
      - backend

  # Single entry point: nginx reverse proxy
  gateway:
    image: nginx:alpine
    ports:
      - "3140:80"
    volumes:
      - ./.docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  kronn-data:
  npm-cache:
  uv-tools:
