# Rate limiting zone — generous for local dev, prevents accidental DDoS
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

server {
    listen 80;
    server_name localhost;

    # Max upload size — MUST match the axum `DefaultBodyLimit` in
    # backend/src/lib.rs (64 MiB). Without this, nginx's 1 MiB default
    # silently 413s any context-file upload over ~1 MB *before* it ever
    # reaches the backend — which is why files >1 MB failed with "fichier
    # trop volumineux" even though the backend accepts up to 64 MB
    # (files-by-message-on-disc, 0.8.8). Set at server level so every
    # location (uploads + SSE message routes) inherits it.
    client_max_body_size 64m;

    # Gzip compression — reduces JS/CSS/JSON size by ~60%
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' ws: wss: https://huggingface.co https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; worker-src 'self' blob:; media-src 'self' blob:; font-src 'self' data:;" always;

    # SSE/long-lived API routes — no rate limiting (these are streaming connections)
    location ~ ^/api/discussions/[^/]+/(messages|run|orchestrate)$ {
        proxy_pass http://backend:3140;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1800s;  # 30 min for long-running SSE (AI orchestration)
    }

    location ~ ^/api/projects/[^/]+/ai-audit$ {
        proxy_pass http://backend:3140;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1800s;
    }

    # API routes → backend (rate limited)
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://backend:3140;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1800s;  # 30 min for long-running SSE (AI audit, orchestration)
    }

    # WebSocket → backend (peer-to-peer sync + frontend real-time)
    location /api/ws {
        proxy_pass http://backend:3140;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;  # 24h keep-alive for persistent WS
    }

    # Everything else → frontend
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }
}
