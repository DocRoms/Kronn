server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Vite-hashed assets (filename contains hash) — cache forever
    location /assets/ {
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # HTML entry point — short cache, revalidate on deploy
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
