name: CI Tests

on:
  pull_request:
    types: [labeled, synchronize]

jobs:
  test-backend:
    if: github.event.label.name == 'ci-test'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
        # No sccache for clippy — cached artifacts can replay stale lint warnings
        # even when the source has changed (sccache hashes deps/flags, not source content)

      # ── Desktop crate compile-check ────────────────────────────────────
      # backend/ and desktop/src-tauri/ are separate crates (no root
      # workspace). cargo clippy above only covers backend → desktop
      # could silently drift and only break at release time
      # (desktop-build.yml runs on v* tags). This check catches the
      # drift at PR time. The 0.5.0 regression that motivated adding it:
      # a new field on AppState was added + initialized in backend::main
      # but forgotten in desktop::main, so the backend crate compiled
      # fine but `cargo tauri build` broke all 4 desktop OS targets.
      - name: Install Linux deps for desktop compile check
        # webkit2gtk-4.1 / libsoup-3.0 / javascriptcoregtk-4.1 are
        # linked via pkg-config by tauri/glib-sys build scripts. Must
        # match the set installed in desktop-build.yml so both paths
        # compile identically.
        run: |
          sudo add-apt-repository -y universe
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            file

      # `include_dir!("../../frontend/dist")` in desktop/src-tauri/src/main.rs
      # is expanded at compile time — Tauri also reads `frontendDist`
      # from tauri.conf.json during `generate_context!`. Both panic if
      # the dir doesn't exist, so we need a real frontend build before
      # the check. We install pnpm + build frontend (production `dist/`).
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable corepack (provides pnpm pinned by package.json)
        # Node 24 ships corepack — it reads `packageManager` from
        # `frontend/package.json` (pnpm@11.0.9) and fetches that exact
        # version on first invocation. Avoids drift between `npm i -g
        # pnpm` (latest, moving) and the version local devs run.
        run: corepack enable

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend (produces frontend/dist/)
        working-directory: frontend
        run: pnpm build

      - name: cargo check — desktop crate
        working-directory: desktop/src-tauri
        run: cargo check --locked
        # --locked so a drift in Cargo.lock vs Cargo.toml also fails here,
        # not just at release.

      # ── Anti-regression lints ─────────────────────────────────────────
      #
      # These grep-based checks catch patterns that clippy can't:
      #
      # 1. std::process::Command::new — On Windows, every Command::new
      #    spawns a visible console window. All production code MUST use
      #    crate::core::cmd::{sync_cmd, async_cmd} which apply
      #    CREATE_NO_WINDOW. Test code (#[cfg(test)]) is exempt.
      #
      # 2. .unwrap_or_default() after .parse::<toml::Value>() — This
      #    was the root cause of a critical bug where Codex config.toml
      #    was silently replaced with an empty table on parse error,
      #    destroying [model_providers] and user auth. Use explicit error
      #    handling (see load_codex_config_for_merge pattern).
      - name: Lint — no raw Command::new in prod code
        run: |
          # On Windows every Command::new flashes a console window. Production
          # code must use crate::core::cmd::{sync_cmd, async_cmd}.
          #
          # Pre-0.8.2 this was a `grep 'Command::new'` bash loop that
          # false-positived on string literals — the Security audit prompt
          # mentions the pattern as something to look for in user code, and
          # the grep saw the literal substring and failed CI.
          #
          # The check is now an AST-aware Rust binary (syn-based) — see
          # examples/lint-no-raw-command.rs. Strings/comments are invisible
          # to the AST, so the whole class of false positives is gone.
          # cfg(test) modules / fns are skipped recursively.
          cargo run --example lint-no-raw-command --quiet

      - name: Lint — no silent TOML unwrap_or_default
        run: |
          # Catch the dangerous pattern: .parse::<toml::Value>() ... .unwrap_or_default()
          # which silently drops user config on parse errors.
          VIOLATIONS=$(grep -rn 'parse.*toml.*Value' src/ --include='*.rs' -A3 \
            | grep 'unwrap_or_default' \
            || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Found .unwrap_or_default() on TOML parse result — handle errors explicitly:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✓ No silent TOML unwrap_or_default"

      - name: cargo test
        run: cargo test
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"

      # ── Desktop compilation check ───────────────────────────────────
      # The Tauri desktop app (desktop/src-tauri/) imports the backend as
      # a lib. Signature changes in the backend break the desktop build
      # but NOT cargo test in backend/. This check catches it early.
      # `cargo check` only type-checks (no link, no Tauri system deps).
      - name: cargo check desktop (type-check only)
        working-directory: desktop/src-tauri
        run: cargo check --lib 2>/dev/null || cargo check 2>&1 | head -40
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"

  test-frontend:
    if: github.event.label.name == 'ci-test'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        # The pnpm version is read from `frontend/package.json`'s
        # `packageManager` field (currently pnpm@11.0.9). Passing
        # `version:` here on top of it makes `pnpm/action-setup@v4`
        # error with `Multiple versions of pnpm specified` — leave
        # this section as-is so the package.json stays the single
        # source of truth.
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: pnpm test

  test-e2e:
    # Playwright E2E tests — drive a real Chromium against Vite + a live
    # backend. Catches UI regressions that vitest unit tests miss (the
    # 0.6.0 "Create button silent", "JsonData ghost agent", "Quick APIs
    # tab buttons leak" were all UI-only bugs that pure-JS tests can't
    # see).
    if: github.event.label.name == 'ci-test'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache (cargo cache for backend)
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        # The pnpm version is read from `frontend/package.json`'s
        # `packageManager` field (currently pnpm@11.0.9). Passing
        # `version:` here on top of it makes `pnpm/action-setup@v4`
        # error with `Multiple versions of pnpm specified` — leave
        # this section as-is so the package.json stays the single
        # source of truth.
        uses: pnpm/action-setup@v4

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        working-directory: frontend
        # Linux deps are pre-installed on ubuntu-latest; we only need the
        # Chromium binary itself.
        run: pnpm exec playwright install --with-deps chromium

      - name: Build backend (release)
        working-directory: backend
        run: cargo build --release --bin kronn
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"

      - name: Start backend in background
        # KRONN_DATA_DIR points at a fresh tmp dir so each CI run starts
        # from a clean SQLite. The backend needs ~5s to boot + first-run
        # config seeding.
        run: |
          export KRONN_DATA_DIR=$(mktemp -d)
          ./target/release/kronn > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid
          # Wait for backend to be ready (max 60s).
          for i in {1..60}; do
            if curl -fsS http://localhost:3140/api/setup/status > /dev/null 2>&1; then
              echo "Backend ready after ${i}s"
              break
            fi
            sleep 1
          done
          if ! curl -fsS http://localhost:3140/api/setup/status > /dev/null 2>&1; then
            echo "Backend failed to start"
            tail -50 /tmp/backend.log
            exit 1
          fi

      - name: Bypass first-run setup wizard
        # Without this step, every E2E test on a fresh KRONN_DATA_DIR
        # hits the SetupWizard (App.tsx mounts `<SetupWizard>` when
        # `setupStatus.is_first_run === true` OR `current_step !==
        # "Complete"`). Specs that don't stub `/api/setup/status` (a11y-axe,
        # audit-launch-smoke, codex-real-introspection, project-scan-mcp-sync,
        # ws-reconnect, …) wait on `[data-tour-id="nav-projects"]` from the
        # Dashboard — which never mounts → 60s timeout → 9 failures.
        # Fix: seed a scan path and call /api/setup/complete so the next
        # status read returns `is_first_run: false, current_step: Complete`.
        run: |
          curl -fsS -X POST -H "Content-Type: application/json" \
            -d '{"paths":["/tmp/kronn-ci-scan"]}' \
            http://localhost:3140/api/setup/scan-paths
          curl -fsS -X POST http://localhost:3140/api/setup/complete
          # Sanity check — fail loud if the wizard is still gating.
          STATUS=$(curl -fsS http://localhost:3140/api/setup/status)
          echo "Setup status after bypass: $STATUS"
          echo "$STATUS" | grep -q '"is_first_run":false' || { echo "Setup bypass did not take effect"; exit 1; }
          echo "$STATUS" | grep -q '"current_step":"Complete"' || { echo "Setup current_step is not Complete"; exit 1; }

      - name: Run E2E tests
        working-directory: frontend
        # Two specs (`project-scan-mcp-sync`, `audit-launch-smoke`) call
        # `mkdtempSync(join(KRONN_REPOS_DIR ?? ~/Repositories, '_kronn_pw_…'))`
        # and throw `ENOENT` if the base dir doesn't exist. On a GitHub
        # runner `~/Repositories` is absent — point `KRONN_REPOS_DIR` at
        # a tmp path we create inline. `RUNNER_TEMP` is auto-cleaned by
        # the runner after the job, no manual cleanup needed.
        run: |
          mkdir -p "$RUNNER_TEMP/kronn-repos"
          export KRONN_REPOS_DIR="$RUNNER_TEMP/kronn-repos"
          pnpm test:e2e
        env:
          CI: "true"

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/backend.pid ]; then
            kill "$(cat /tmp/backend.pid)" 2>/dev/null || true
          fi

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results/
          retention-days: 7

      - name: Upload backend logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-logs
          path: /tmp/backend.log
          retention-days: 7

  test-shell:
    if: github.event.label.name == 'ci-test'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run bats tests
        run: make test-shell

  security-scan:
    if: github.event.label.name == 'ci-test'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo-audit binary
        id: cache-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-v0.21

      - name: Install cargo-audit
        if: steps.cache-audit.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"

      - name: Run cargo audit
        working-directory: backend
        run: cargo audit
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        # The pnpm version is read from `frontend/package.json`'s
        # `packageManager` field (currently pnpm@11.0.9). Passing
        # `version:` here on top of it makes `pnpm/action-setup@v4`
        # error with `Multiple versions of pnpm specified` — leave
        # this section as-is so the package.json stays the single
        # source of truth.
        uses: pnpm/action-setup@v4

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        working-directory: frontend
        run: pnpm audit --audit-level=moderate || true
