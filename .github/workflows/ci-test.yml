name: CI Tests

on:
  pull_request:
    types: [labeled, synchronize]

jobs:
  test-backend:
    if: github.event.label.name == 'ci-test'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
        # No sccache for clippy — cached artifacts can replay stale lint warnings
        # even when the source has changed (sccache hashes deps/flags, not source content)

      # ── Anti-regression lints ─────────────────────────────────────────
      #
      # These grep-based checks catch patterns that clippy can't:
      #
      # 1. std::process::Command::new — On Windows, every Command::new
      #    spawns a visible console window. All production code MUST use
      #    crate::core::cmd::{sync_cmd, async_cmd} which apply
      #    CREATE_NO_WINDOW. Test code (#[cfg(test)]) is exempt.
      #
      # 2. .unwrap_or_default() after .parse::<toml::Value>() — This
      #    was the root cause of a critical bug where Codex config.toml
      #    was silently replaced with an empty table on parse error,
      #    destroying [model_providers] and user auth. Use explicit error
      #    handling (see load_codex_config_for_merge pattern).
      - name: Lint — no raw Command::new in prod code
        run: |
          # On Windows every Command::new flashes a console window. Production
          # code must use crate::core::cmd::{sync_cmd, async_cmd}.
          #
          # Strategy: for each .rs file (excluding cmd.rs and *_test.rs),
          # find the first #[cfg(test)] line. Any Command::new BEFORE that
          # line is production code → violation. Lines AFTER it are test
          # helpers and are exempt.
          #
          # Note: we use LINE_NUM instead of LINENO because LINENO is a
          # bash builtin (current script line number).
          FAIL=0
          for file in $(grep -rl 'Command::new' src/ --include='*.rs' \
                        | grep -v 'src/core/cmd.rs' \
                        | grep -v '_test.rs'); do
            TEST_LINE=$(grep -n '#\[cfg(test)\]' "$file" | head -1 | cut -d: -f1)
            TEST_LINE=${TEST_LINE:-999999}
            while IFS=: read -r LINE_NUM rest; do
              if [ "$LINE_NUM" -lt "$TEST_LINE" ]; then
                echo "::error file=$file,line=$LINE_NUM::Raw Command::new in prod code (use cmd::sync_cmd/async_cmd)"
                echo "  $file:$LINE_NUM:$rest"
                FAIL=1
              fi
            done < <(grep -n 'Command::new' "$file")
          done
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "✓ No raw Command::new in production code"

      - name: Lint — no silent TOML unwrap_or_default
        run: |
          # Catch the dangerous pattern: .parse::<toml::Value>() ... .unwrap_or_default()
          # which silently drops user config on parse errors.
          VIOLATIONS=$(grep -rn 'parse.*toml.*Value' src/ --include='*.rs' -A3 \
            | grep 'unwrap_or_default' \
            || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Found .unwrap_or_default() on TOML parse result — handle errors explicitly:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✓ No silent TOML unwrap_or_default"

      - name: cargo test
        run: cargo test
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"

      # ── Desktop compilation check ───────────────────────────────────
      # The Tauri desktop app (desktop/src-tauri/) imports the backend as
      # a lib. Signature changes in the backend break the desktop build
      # but NOT cargo test in backend/. This check catches it early.
      # `cargo check` only type-checks (no link, no Tauri system deps).
      - name: cargo check desktop (type-check only)
        working-directory: desktop/src-tauri
        run: cargo check --lib 2>/dev/null || cargo check 2>&1 | head -40
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"

  test-frontend:
    if: github.event.label.name == 'ci-test'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: pnpm test

  test-shell:
    if: github.event.label.name == 'ci-test'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run bats tests
        run: make test-shell

  security-scan:
    if: github.event.label.name == 'ci-test'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo-audit binary
        id: cache-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-v0.21

      - name: Install cargo-audit
        if: steps.cache-audit.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"

      - name: Run cargo audit
        working-directory: backend
        run: cargo audit
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        working-directory: frontend
        run: pnpm audit --audit-level=moderate || true
