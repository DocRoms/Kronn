name: Desktop Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - os: macos-15
            target: x86_64-apple-darwin
            label: macOS-x64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.label }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          # Tauri 2 requires webkit2gtk-4.1 (vs Tauri 1 / webkit2gtk-4.0).
          # Ubuntu 22.04 ships 4.1 in the universe repository (enabled by
          # default on desktop installs). We also pull libsoup-3.0-dev and
          # libjavascriptcoregtk-4.1-dev explicitly: webkit2gtk-4.1 transitively
          # depends on them but on minimal images (CI containers, server
          # installs) the dev headers are not always pulled in automatically.
          # patchelf is required by tauri-bundler to fix RPATHs in the AppImage.
          sudo add-apt-repository -y universe
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            file

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable corepack (provides pnpm pinned by package.json)
        # See `ci-test.yml`. Corepack reads `packageManager` from
        # `frontend/package.json` (pnpm@11.0.9) — single source of truth
        # for the pnpm version across local dev, CI, and Docker builds.
        run: corepack enable

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      # Clean old bundle artifacts from cargo cache to avoid uploading stale installers
      - name: Clean old bundles
        shell: bash
        run: rm -rf desktop/src-tauri/target/${{ matrix.target }}/release/bundle

      - name: Build Tauri app
        working-directory: desktop/src-tauri
        shell: bash
        run: |
          # Only export Apple signing env vars if actually configured (non-empty).
          # When secrets are unset, GitHub passes empty strings — Tauri interprets an
          # empty APPLE_CERTIFICATE as "try to sign" and fails on certificate import.
          if [ -n "$_APPLE_CERTIFICATE" ]; then
            export APPLE_CERTIFICATE="$_APPLE_CERTIFICATE"
            export APPLE_CERTIFICATE_PASSWORD="$_APPLE_CERTIFICATE_PASSWORD"
            export APPLE_SIGNING_IDENTITY="$_APPLE_SIGNING_IDENTITY"
            export APPLE_ID="$_APPLE_ID"
            export APPLE_PASSWORD="$_APPLE_PASSWORD"
            export APPLE_TEAM_ID="$_APPLE_TEAM_ID"
          fi
          cargo tauri build --target ${{ matrix.target }}
        env:
          # Tauri updater signing — safe to pass even if empty (Tauri ignores empty values)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple signing — stored in prefixed vars, only exported when non-empty (see script above)
          _APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          _APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          _APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          _APPLE_ID: ${{ secrets.APPLE_ID }}
          _APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          _APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Ad-hoc sign macOS .app when no Apple Developer certificate is configured.
      # This removes the "app is damaged" error for most users. Without a paid
      # Apple Developer ID ($99/yr), full notarization is not possible — users
      # may still need to run: xattr -cr /Applications/Kronn.app
      - name: Ad-hoc sign macOS app
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          # `bash -e -o pipefail` propagates find's non-zero exit when its
          # search path doesn't exist, which kills the whole step before
          # the fallback message can run. Guard the directory explicitly
          # and log diagnostics — useful when tauri-bundler decides to
          # write the bundle under a different target prefix than we
          # expect (happened on macos-15 / x86_64-apple-darwin where the
          # bundle landed under `release/bundle` without the target prefix).
          # Bundle path resolution. Two roots possible:
          #   - LEGACY (pre-2026-05-15): `desktop/src-tauri/target/...`
          #   - SHARED  (since `.cargo/config.toml` set `target-dir = "target"`
          #     at the repo root to mutualise tokio/serde/reqwest between
          #     backend/ and desktop/src-tauri/ → ~40-50% local cache savings,
          #     cf. [[feedback_rust_target_bloat]]): `target/...` (project root).
          # Two triple suffixes possible: `<triple>/release/bundle` when
          # cross-compiling, plain `release/bundle` when host==target.
          # Check all 4 combinations, use the first that exists.
          BUNDLE_CANDIDATES=(
            "desktop/src-tauri/target/${{ matrix.target }}/release/bundle"
            "desktop/src-tauri/target/release/bundle"
            "target/${{ matrix.target }}/release/bundle"
            "target/release/bundle"
          )
          BUNDLE_DIR=""
          for c in "${BUNDLE_CANDIDATES[@]}"; do
            if [ -d "$c" ]; then
              echo "Bundle dir found at $c"
              BUNDLE_DIR="$c"
              break
            fi
          done
          if [ -z "$BUNDLE_DIR" ]; then
            echo "No bundle dir found in any of:"
            printf '  - %s\n' "${BUNDLE_CANDIDATES[@]}"
            echo "Diagnostics:"
            ls -la "target/" 2>/dev/null || echo "  (root target/ missing)"
            ls -la "desktop/src-tauri/target/" 2>/dev/null || echo "  (desktop/src-tauri/target/ missing)"
            echo "Skipping ad-hoc sign — no bundle to sign."
            exit 0
          fi
          APP_PATH=$(find "$BUNDLE_DIR" -maxdepth 3 -name "*.app" 2>/dev/null | head -1)
          if [ -n "$APP_PATH" ] && [ -z "$_APPLE_CERTIFICATE" ]; then
            echo "No Apple Developer certificate — applying ad-hoc signature"
            codesign --force --deep -s - "$APP_PATH"
            echo "Ad-hoc signed: $APP_PATH"
          else
            echo "Skipping ad-hoc sign (Apple certificate configured or no .app found)"
          fi
        env:
          _APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}

      # ─── Upload artifacts ─────────────────────────────────────────

      # Path resolution note (2026-05-18 fix): since `.cargo/config.toml`
      # sets `target-dir = "target"` at the repo root, builds now land in
      # `/target/...` instead of `/desktop/src-tauri/target/...`. The
      # globs below carry BOTH roots so the workflow works whether the
      # build was emitted under the legacy or shared target dir.
      # `upload-artifact` silently skips missing paths so listing both
      # is safe. Cf. [[feedback_rust_target_bloat]].

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: kronn-windows
          path: |
            desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi

      - name: Upload macOS artifacts
        if: startsWith(matrix.os, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: kronn-${{ matrix.label }}
          # Four candidate paths: legacy vs shared target root × prefixed
          # triple vs unprefixed (Tauri uses the unprefixed `release/bundle`
          # when --target is the host-default triple, e.g. macos-15 /
          # x86_64-apple-darwin cross-compile on arm64 host).
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: kronn-linux
          path: |
            desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage

  # ─── Create GitHub Release on tag ─────────────────────────────────

  release:
    needs: build-desktop
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          body: |
            ## Installation

            | OS | File | Min version |
            |----|------|-------------|
            | Windows | `.exe` (NSIS) or `.msi` | Windows 10+ |
            | macOS Apple Silicon | `aarch64.dmg` | macOS 11+ |
            | macOS Intel | `x64.dmg` | macOS 11+ |
            | Linux | `.deb` or `.AppImage` | Ubuntu 22.04+ / Debian 12+ / Fedora 38+ |

            ### Linux — webkit2gtk-4.1 requirement

            Kronn uses Tauri 2 which requires **`libwebkit2gtk-4.1-0`** at runtime.
            On Ubuntu 22.04 it lives in the `universe` repository (enabled by
            default on desktop installs). On minimal/server installs you may need:
            ```bash
            sudo add-apt-repository universe
            sudo apt update
            sudo apt install -y libwebkit2gtk-4.1-0
            sudo dpkg -i kronn_*.deb
            sudo apt-get -f install   # resolves any remaining deps
            ```
            On older distros (Ubuntu 20.04, RHEL 8) the `.deb` will not install —
            use the AppImage instead, or upgrade.

            ### macOS — "app is damaged" warning

            Kronn is open-source and not signed with an Apple Developer certificate.
            macOS Gatekeeper may show _"Kronn is damaged and can't be opened"_.

            **Fix** — run this once after installing:
            ```bash
            xattr -cr /Applications/Kronn.app
            ```
            Then open the app normally.

          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.AppImage
