name: Desktop Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - os: macos-15
            target: x86_64-apple-darwin
            label: macOS-x64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.label }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      # Clean old bundle artifacts from cargo cache to avoid uploading stale installers
      - name: Clean old bundles
        shell: bash
        run: rm -rf desktop/src-tauri/target/${{ matrix.target }}/release/bundle

      - name: Build Tauri app
        working-directory: desktop/src-tauri
        shell: bash
        run: |
          # Only export Apple signing env vars if actually configured (non-empty).
          # When secrets are unset, GitHub passes empty strings — Tauri interprets an
          # empty APPLE_CERTIFICATE as "try to sign" and fails on certificate import.
          if [ -n "$_APPLE_CERTIFICATE" ]; then
            export APPLE_CERTIFICATE="$_APPLE_CERTIFICATE"
            export APPLE_CERTIFICATE_PASSWORD="$_APPLE_CERTIFICATE_PASSWORD"
            export APPLE_SIGNING_IDENTITY="$_APPLE_SIGNING_IDENTITY"
            export APPLE_ID="$_APPLE_ID"
            export APPLE_PASSWORD="$_APPLE_PASSWORD"
            export APPLE_TEAM_ID="$_APPLE_TEAM_ID"
          fi
          cargo tauri build --target ${{ matrix.target }}
        env:
          # Tauri updater signing — safe to pass even if empty (Tauri ignores empty values)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple signing — stored in prefixed vars, only exported when non-empty (see script above)
          _APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          _APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          _APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          _APPLE_ID: ${{ secrets.APPLE_ID }}
          _APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          _APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Ad-hoc sign macOS .app when no Apple Developer certificate is configured.
      # This removes the "app is damaged" error for most users. Without a paid
      # Apple Developer ID ($99/yr), full notarization is not possible — users
      # may still need to run: xattr -cr /Applications/Kronn.app
      - name: Ad-hoc sign macOS app
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          APP_PATH=$(find desktop/src-tauri/target/${{ matrix.target }}/release/bundle -name "*.app" -maxdepth 3 | head -1)
          if [ -n "$APP_PATH" ] && [ -z "$_APPLE_CERTIFICATE" ]; then
            echo "No Apple Developer certificate — applying ad-hoc signature"
            codesign --force --deep -s - "$APP_PATH"
            echo "Ad-hoc signed: $APP_PATH"
          else
            echo "Skipping ad-hoc sign (Apple certificate configured or no .app found)"
          fi
        env:
          _APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}

      # ─── Upload artifacts ─────────────────────────────────────────

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: kronn-windows
          path: |
            desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi

      - name: Upload macOS artifacts
        if: startsWith(matrix.os, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: kronn-${{ matrix.label }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: kronn-linux
          path: |
            desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage

  # ─── Create GitHub Release on tag ─────────────────────────────────

  release:
    needs: build-desktop
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          body: |
            ## Installation

            | OS | File |
            |----|------|
            | Windows | `.exe` (NSIS) or `.msi` |
            | macOS Apple Silicon | `aarch64.dmg` |
            | macOS Intel | `x64.dmg` |
            | Linux | `.deb` or `.AppImage` |

            ### macOS — "app is damaged" warning

            Kronn is open-source and not signed with an Apple Developer certificate.
            macOS Gatekeeper may show _"Kronn is damaged and can't be opened"_.

            **Fix** — run this once after installing:
            ```bash
            xattr -cr /Applications/Kronn.app
            ```
            Then open the app normally.

          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.AppImage
